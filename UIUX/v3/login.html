<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <title>eCitizen Events - Secure Login</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <div class="login-page">

    <!-- HEADER -->
    <header class="login-header">
      <div class="login-header-inner">
        <div class="login-brand">
          <div class="login-brand-icon">
            <span class="material-symbols-outlined">account_balance</span>
          </div>
          <h2 class="login-brand-name">Events</h2>
        </div>
        <div class="login-user-avatar">
          <span class="material-symbols-outlined">person</span>
        </div>
      </div>
    </header>

    <!-- MAIN -->
    <main class="login-main">
      <div class="login-card">

        <!-- Icon & Heading -->
        <div class="login-heading-section">
          <div class="login-lock-icon-wrap">
            <span class="material-symbols-outlined">lock</span>
          </div>
          <h1 class="login-title">Secure Access</h1>
          <p class="login-subtitle">Please enter your 6-digit access PIN to continue to the events portal.</p>
        </div>

        <!-- PIN Dots -->
        <div class="login-pin-dots">
          <div class="login-dot login-dot-active"></div>
          <div class="login-dot login-dot-active"></div>
          <div class="login-dot"></div>
          <div class="login-dot"></div>
          <div class="login-dot"></div>
          <div class="login-dot"></div>
        </div>

        <!-- Keypad -->
        <div class="login-keypad">
          <button class="login-key" type="button">1</button>
          <button class="login-key" type="button">2</button>
          <button class="login-key" type="button">3</button>
          <button class="login-key" type="button">4</button>
          <button class="login-key" type="button">5</button>
          <button class="login-key" type="button">6</button>
          <button class="login-key" type="button">7</button>
          <button class="login-key" type="button">8</button>
          <button class="login-key" type="button">9</button>
          <div class="login-key-empty"></div>
          <button class="login-key" type="button">0</button>
          <button class="login-key login-key-backspace" type="button">
            <span class="material-symbols-outlined">backspace</span>
          </button>
        </div>

        <!-- Card Footer Links -->
        <div class="login-card-footer">
          <button class="login-forgot-btn" type="button">Forgot PIN?</button>
          <div class="login-encrypted-note">
            <span class="material-symbols-outlined">verified_user</span>
            <span>End-to-end encrypted session</span>
          </div>
        </div>

      </div>
    </main>


  </div>

</body>

</html>
